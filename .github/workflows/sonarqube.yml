name: SonarQube Cloud Scan
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube-scan:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable # <-- THIS FIXES THE PROFESSOR'S BUG
          
      - name: Install Flutter Dependencies
        run: flutter pub get
        working-directory: ./printing_manager # <-- THIS TELLS IT WHERE YOUR SPECIFIC CODE IS
        
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
